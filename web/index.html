<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Basecamp — teacher coordination.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="basecamps">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Match the app's surface color so the system status bar +
       browser chrome share the same background as the Flutter
       canvas. Without these, the safe-area / status-bar area
       showed the browser's default white/black before the canvas
       paints, leaving a visible seam at the top of the screen. -->
  <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#141413" media="(prefers-color-scheme: dark)">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>basecamps</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Match the body background to the Flutter canvas's scaffold
       color so any pixel outside the canvas (split-screen on
       mobile web, scroll bounce, etc.) shares the same color
       instead of flashing white/black. */
    html, body {
      margin: 0;
      padding: 0;
      background: #FAFAF8;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #141413;
      }
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
