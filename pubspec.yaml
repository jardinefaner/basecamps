name: basecamp
description: A minimalist coordination tool for teachers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  camera: ^0.11.0
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  html: ^0.15.5
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.0
  record: ^6.1.1
  share_plus: ^11.0.0
  shared_preferences: ^2.5.5
  signature: ^5.5.0
  supabase_flutter: ^2.12.2
  url_launcher: ^6.3.1
  video_player: ^2.9.2
  web: ^1.1.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
