name: basecamp
description: A minimalist coordination tool for teachers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  supabase_flutter: ^2.12.2

dev_dependencies:
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
